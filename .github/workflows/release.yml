name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Create release directory
        run: mkdir -p release

      - name: Update version in source
        run: |
          sed -i '' "s/let baguetteVersion = \".*\"/let baguetteVersion = \"${{ steps.version.outputs.version }}\"/" Sources/Baguette/App/Version.swift
          grep baguetteVersion Sources/Baguette/App/Version.swift

      - name: Build arm64
        run: |
          swift build -c release --arch arm64 --disable-sandbox
          strip -rSTx .build/arm64-apple-macosx/release/Baguette

      - name: Package binary + resource bundle
        run: |
          BUILD_DIR=.build/arm64-apple-macosx/release
          STAGING=baguette-${{ steps.version.outputs.tag }}-macOS-arm64
          mkdir -p "$STAGING"
          cp "$BUILD_DIR/Baguette" "$STAGING/Baguette"
          # Resource bundle holds Sources/Baguette/Resources/Web for `serve`.
          # Must sit next to the executable at runtime.
          cp -R "$BUILD_DIR/Baguette_Baguette.bundle" "$STAGING/Baguette_Baguette.bundle"
          tar czf "release/baguette_${{ steps.version.outputs.tag }}_macOS_arm64.tar.gz" "$STAGING"

      - name: Create checksums
        run: |
          cd release
          shasum -a 256 * > baguette_${{ steps.version.outputs.tag }}_checksums.txt

      - name: Prepare release notes
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURATED=$(./scripts/extract-changelog.sh "$VERSION" 2>/dev/null || true)
          GENERATED=$(gh api --method POST \
            "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="v$VERSION" \
            -f target_commitish="$GITHUB_SHA" \
            --jq '.body')

          if [ -n "$CURATED" ]; then
            printf '%s\n\n%s\n' "$CURATED" "$GENERATED" > release-notes.md
          else
            printf '%s\n' "$GENERATED" > release-notes.md
            echo "::warning::No CHANGELOG entry found for v$VERSION; using GitHub-generated notes"
            echo "used_generated=true" >> "$GITHUB_OUTPUT"

            # Nest generated notes under the promoted version heading. The
            # redundant compare link remains in the GitHub Release only.
            printf '%s\n' "$GENERATED" \
              | sed 's/^## What.s Changed$/### Changed/' \
              | sed '/^\*\*Full Changelog\*\*:/d' \
              > generated-changelog.md
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: baguette ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ./scripts/promote-changelog.sh "$VERSION" "$(date +%Y-%m-%d)"
          # Preserve GitHub's PR + author attribution in CHANGELOG too when
          # a contributor did not add a curated Unreleased entry.
          if [ "${{ steps.changelog.outputs.used_generated }}" = "true" ]; then
            awk -v ver="$VERSION" -v notes="generated-changelog.md" '
              { print }
              $0 ~ ("^## \\[" ver "\\] - ") {
                print ""
                while ((getline line < notes) > 0) print line
                close(notes)
              }
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet \
            && echo "No CHANGELOG changes to commit" \
            || git commit -m "chore(changelog): promote [Unreleased] to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

  update-tap:
    needs: release
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      version: ${{ needs.release.outputs.tag }}
    secrets: inherit
